<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine-ku Modern Movie Streaming Hub</title>
  <meta name="description" content="Cine-ku adalah website film modern dengan koleksi film populer, top rated, dan upcoming dari TMDb." />
  <link rel="icon" href="assets/logo/logo.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="preconnect" href="https://image.tmdb.org" />
</head>
<body>
  <!-- ============== NAVBAR ============== -->
  <header class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <span class="logo-mark">🎬</span>
        <span class="logo-text">Cine-<span>ku</span></span>
      </a>
      <nav class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="search.html">Search</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="about.html">About</a>
      </nav>
      <div class="nav-auth" id="navAuth">
        <button class="btn-login" id="btnLogin">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35.5 24 35.5c-6.4 0-11.5-5.1-11.5-11.5S17.6 12.5 24 12.5c2.9 0 5.6 1.1 7.6 2.9l5.7-5.7C33.7 6.5 29.1 4.5 24 4.5 13.2 4.5 4.5 13.2 4.5 24S13.2 43.5 24 43.5 43.5 34.8 43.5 24c0-1.2-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 12.5 24 12.5c2.9 0 5.6 1.1 7.6 2.9l5.7-5.7C33.7 6.5 29.1 4.5 24 4.5 16.3 4.5 9.7 8.9 6.3 14.7z"/><path fill="#4CAF50" d="M24 43.5c5 0 9.6-1.9 13.1-5l-6.1-5c-1.9 1.4-4.3 2.2-7 2.2-5.3 0-9.7-3.1-11.3-7.5l-6.5 5C9.5 39 16.2 43.5 24 43.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4-4 5.3l6.1 5c-.4.4 6.6-4.8 6.6-14.3 0-1.2-.1-2.3-.4-3.5z"/></svg>
          Login with Google
        </button>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ============== HERO BANNER CAROUSEL ============== -->
  <section class="hero-carousel" id="heroCarousel">
    <div class="hero-slides" id="heroSlides">
      <!-- diisi oleh JS -->
    </div>
    <div class="hero-dots" id="heroDots"></div>
  </section>

  <!-- ============== MOVIE SECTIONS ============== -->
  <main class="main-content">
    <section class="movie-section" data-category="popular">
      <div class="section-head">
        <h2>🔥 Popular Movies</h2>
        <p>Film yang sedang populer dan banyak ditonton saat ini</p>
      </div>
      <div class="slider-wrap">
        <button class="slider-btn prev" data-target="popular">‹</button>
        <div class="movie-slider" id="popularSlider"></div>
        <button class="slider-btn next" data-target="popular">›</button>
      </div>
    </section>

    <section class="movie-section" data-category="top_rated">
      <div class="section-head">
        <h2>⭐ Top Rated Movies</h2>
        <p>Film dengan rating tertinggi dari pengguna</p>
      </div>
      <div class="slider-wrap">
        <button class="slider-btn prev" data-target="top_rated">‹</button>
        <div class="movie-slider" id="topRatedSlider"></div>
        <button class="slider-btn next" data-target="top_rated">›</button>
      </div>
    </section>

    <section class="movie-section" data-category="upcoming">
      <div class="section-head">
        <h2>🎟️ Upcoming Movies</h2>
        <p>Film yang akan segera tayang di bioskop</p>
      </div>
      <div class="slider-wrap">
        <button class="slider-btn prev" data-target="upcoming">‹</button>
        <div class="movie-slider" id="upcomingSlider"></div>
        <button class="slider-btn next" data-target="upcoming">›</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> Cine-ku Built by <strong>nur faiz</strong> · Data by TMDb</p>
  </footer>

  <!-- Firebase (modular CDN) -->
  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/wishlist.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
